<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Silver - Notification Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #c0c0c0;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
        }

        .header p {
            color: #808080;
            font-size: 1.1em;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(192, 192, 192, 0.1);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-5px);
            border-color: rgba(192, 192, 192, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .status-card h3 {
            color: #c0c0c0;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .status-indicator.online {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }

        .status-indicator.offline {
            background: #f44336;
            box-shadow: 0 0 10px #f44336;
        }

        .status-indicator.loading {
            background: #ff9800;
            box-shadow: 0 0 10px #ff9800;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(192, 192, 192, 0.1);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #808080;
        }

        .stat-value {
            color: #c0c0c0;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(192, 192, 192, 0.1);
            color: #606060;
            font-size: 0.9em;
        }

        .footer a {
            color: #c0c0c0;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: #808080;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Bitcoin Silver</h1>
            <p>Push Notification Server</p>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <h3>
                    <span class="status-indicator loading" id="api-status"></span>
                    API Server
                </h3>
                <div id="api-info" class="loading">Loading...</div>
            </div>

            <div class="status-card">
                <h3>
                    <span class="status-indicator loading" id="node-status"></span>
                    Bitcoin Node
                </h3>
                <div id="node-info" class="loading">Loading...</div>
            </div>

            <div class="status-card">
                <h3>
                    <span class="status-indicator loading" id="db-status"></span>
                    Database
                </h3>
                <div id="db-info" class="loading">Loading...</div>
            </div>

            <div class="status-card">
                <h3>
                    <span class="status-indicator loading" id="monitor-status"></span>
                    ZMQ Monitor
                </h3>
                <div id="monitor-info" class="loading">Loading...</div>
            </div>

            <div class="status-card">
                <h3>
                    <span class="status-indicator loading" id="price-status"></span>
                    BTCS Price
                </h3>
                <div id="price-info" class="loading">Loading...</div>
            </div>

            <div class="status-card">
                <h3>
                    <span class="status-indicator loading" id="chat-status"></span>
                    💬 Messenger
                </h3>
                <div id="chat-info" class="loading">Loading...</div>
            </div>
        </div>

        <div class="status-card">
            <h3>📊 Statistics</h3>
            <div id="stats-info" class="loading">Loading...</div>
        </div>

        <div class="footer">
            <p>Powered by Bitcoin Silver |
                <a href="https://bitcoinsilver.top" target="_blank">bitcoinsilver.top</a>
            </p>
            <p style="margin-top: 10px; font-size: 0.85em;">
                Last updated: <span id="update-time">--</span>
            </p>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/health');
                const data = await response.json();

                // Update API status
                document.getElementById('api-status').className = 'status-indicator online';
                document.getElementById('api-info').innerHTML = `
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">Online</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Environment</span>
                        <span class="stat-value">${data.environment || 'production'}</span>
                    </div>
                `;

                // Update Bitcoin Node status
                const nodeStatus = data.services.bitcoin_node === 'ok';
                document.getElementById('node-status').className = 'status-indicator ' + (nodeStatus ? 'online' : 'offline');
                document.getElementById('node-info').innerHTML = `
                    <div class="stat-row">
                        <span class="stat-label">Chain</span>
                        <span class="stat-value">${data.blockchain.chain}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Blocks</span>
                        <span class="stat-value">${data.blockchain.blocks.toLocaleString()}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Synced</span>
                        <span class="stat-value">${data.blockchain.synced ? 'Yes' : 'No'}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Progress</span>
                        <span class="stat-value">${data.blockchain.verification_progress}</span>
                    </div>
                `;

                // Update Database status
                const dbStatus = data.services.database === 'ok';
                document.getElementById('db-status').className = 'status-indicator ' + (dbStatus ? 'online' : 'offline');
                document.getElementById('db-info').innerHTML = `
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">${dbStatus ? 'Connected' : 'Disconnected'}</span>
                    </div>
                `;

                // Update Monitor status
                const monitorStatus = data.services.monitoring === 'active';
                document.getElementById('monitor-status').className = 'status-indicator ' + (monitorStatus ? 'online' : 'offline');
                document.getElementById('monitor-info').innerHTML = `
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">${monitorStatus ? 'Active' : 'Inactive'}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Type</span>
                        <span class="stat-value">Real-time</span>
                    </div>
                `;

                // Fetch price data
                try {
                    const priceResponse = await fetch('/api/price-monitor/status');
                    const priceData = await priceResponse.json();

                    const priceActive = priceData.isMonitoring;
                    document.getElementById('price-status').className = 'status-indicator ' + (priceActive ? 'online' : 'offline');

                    // Fetch latest price from database
                    const latestPriceResponse = await fetch('/api/price/current');
                    if (latestPriceResponse.ok) {
                        const latestPriceData = await latestPriceResponse.json();
                        const price = latestPriceData.price;
                        const formattedPrice = price < 0.01 ? price.toFixed(8) : price < 1 ? price.toFixed(6) : price.toFixed(4);

                        document.getElementById('price-info').innerHTML = `
                            <div class="stat-row">
                                <span class="stat-label">Current Price</span>
                                <span class="stat-value" style="color: #4caf50; font-size: 1.2em;">$${formattedPrice}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Source</span>
                                <span class="stat-value">LiveCoinWatch</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Check Interval</span>
                                <span class="stat-value">${priceData.checkIntervalMinutes} min</span>
                            </div>
                        `;
                    } else {
                        document.getElementById('price-info').innerHTML = `
                            <div class="stat-row">
                                <span class="stat-label">Status</span>
                                <span class="stat-value">Collecting data...</span>
                            </div>
                        `;
                    }
                } catch (error) {
                    document.getElementById('price-status').className = 'status-indicator offline';
                    document.getElementById('price-info').innerHTML = `
                        <div class="stat-row">
                            <span class="stat-label">Status</span>
                            <span class="stat-value">Unavailable</span>
                        </div>
                    `;
                }

                // Fetch chat stats
                try {
                    const chatResponse = await fetch('/api/chat/stats');
                    const chatData = await chatResponse.json();

                    if (chatData.success) {
                        document.getElementById('chat-status').className = 'status-indicator online';
                        document.getElementById('chat-info').innerHTML = `
                            <div class="stat-row">
                                <span class="stat-label">Total Messages</span>
                                <span class="stat-value">${chatData.total_messages || 0}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Total Users</span>
                                <span class="stat-value">${chatData.total_users || 0}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Latest Message</span>
                                <span class="stat-value">${chatData.latest_message ? new Date(chatData.latest_message).toLocaleString() : 'N/A'}</span>
                            </div>
                        `;
                    } else {
                        throw new Error('Chat stats not available');
                    }
                } catch (error) {
                    document.getElementById('chat-status').className = 'status-indicator offline';
                    document.getElementById('chat-info').innerHTML = `
                        <div class="stat-row">
                            <span class="stat-label">Status</span>
                            <span class="stat-value">Unavailable</span>
                        </div>
                    `;
                }

                // Fetch stats
                const statsResponse = await fetch('/api/stats');
                const statsData = await statsResponse.json();

                const stats = statsData.stats || {};

                document.getElementById('stats-info').innerHTML = `
                    <div class="stat-row">
                        <span class="stat-label">Registered Devices</span>
                        <span class="stat-value">${stats.total_devices || 0}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Unique Addresses</span>
                        <span class="stat-value">${stats.unique_addresses || 0}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Notifications Sent</span>
                        <span class="stat-value">${stats.total_notifications || 0}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Blockchain Height</span>
                        <span class="stat-value">${stats.blockchain_height ? stats.blockchain_height.toLocaleString() : 'N/A'}</span>
                    </div>
                `;

                // Update timestamp
                document.getElementById('update-time').textContent = new Date().toLocaleTimeString();

            } catch (error) {
                console.error('Failed to fetch status:', error);
                document.getElementById('api-status').className = 'status-indicator offline';
                document.getElementById('api-info').innerHTML = '<div style="color: #f44336;">Failed to connect</div>';
            }
        }

        // Initial fetch
        fetchStatus();

        // Auto-refresh every 30 seconds
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
